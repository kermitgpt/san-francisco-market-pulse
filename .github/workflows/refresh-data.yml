name: Refresh neighborhood data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 15 17 * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm pipeline -- --refresh
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      - name: Commit refreshed outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed
          if git diff --cached --quiet; then
            echo "No processed data changes."
            exit 0
          fi
          git commit -m "data: refresh San Francisco neighborhood pulse"
          git push
