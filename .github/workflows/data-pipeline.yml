name: Refresh recorded sales data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

permissions:
  contents: write

concurrency:
  group: recorded-sales-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm pipeline

      - name: Commit changed public-data outputs
        shell: bash
        run: |
          if git diff --quiet -- data/processed; then
            echo "No processed-data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed
          git commit -m "Refresh recorded sales data"
          git push
